<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — SportLog</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link href="{% static 'css/dashboard.css' %}" rel="stylesheet">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">SPORT<em>LOG</em></span>
    </div>
 
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">
      Dashboard
      </a>
      <a href="#" class="nav-item">
        Parcels
      </a>
      <a href="#" class="nav-item">
     Tracking
      </a>
      <a href="#" class="nav-item">
        Users
      </a>
      <a href="#" class="nav-item">
        Reports
      </a>
    </nav>
 
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar">{{ user.username|first|upper }}</div>
        <div class="user-meta">
          <span class="user-name">{{ user.get_full_name|default:user.username }}</span>
          <span class="user-role">{{ user.get_role_display }}</span>
        </div>
      </div>
      <a href="{% url 'logout' %}" class="logout-btn" title="Logout">
      </a>
    </div>
  </aside>

<div class="main">

<header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Dashboard</h1>
        <span class="page-sub">Welcome, {{ user.username }}</span>

    </header>


<div class="content">
 
    <div class="role-badge admin-badge">OVERVIEW</div>
 

    </div>

      {% endif %}

</body>
</html>
